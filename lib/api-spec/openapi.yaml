openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VendorFlow API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: vendors
    description: Vendor operations
  - name: procurement
    description: Purchase order operations
  - name: inventory
    description: Inventory operations
  - name: audit
    description: Audit log operations
  - name: dashboard
    description: Dashboard statistics
  - name: notifications
    description: Notification operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorInput"
      responses:
        "201":
          description: Created vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VendorUpdate"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /procurement:
    get:
      operationId: listPurchaseOrders
      tags: [procurement]
      summary: List purchase orders
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"
    post:
      operationId: createPurchaseOrder
      tags: [procurement]
      summary: Create a purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /procurement/{id}:
    get:
      operationId: getPurchaseOrder
      tags: [procurement]
      summary: Get a purchase order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Purchase order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePurchaseOrder
      tags: [procurement]
      summary: Update a purchase order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"
    delete:
      operationId: deletePurchaseOrder
      tags: [procurement]
      summary: Delete a purchase order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /procurement/{id}/status:
    patch:
      operationId: updatePurchaseOrderStatus
      tags: [procurement]
      summary: Update purchase order status (approve/reject/submit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseOrder"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List inventory items
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Create an inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    get:
      operationId: getInventoryItem
      tags: [inventory]
      summary: Get an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /audit:
    get:
      operationId: listAuditLogs
      tags: [audit]
      summary: List audit logs
      responses:
        "200":
          description: List of audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLog"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/spending-by-vendor:
    get:
      operationId: getSpendingByVendor
      tags: [dashboard]
      summary: Get spending grouped by vendor
      responses:
        "200":
          description: Spending by vendor
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorSpending"

  /dashboard/orders-by-status:
    get:
      operationId: getOrdersByStatus
      tags: [dashboard]
      summary: Get order counts by status
      responses:
        "200":
          description: Orders by status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, approver, user]
        tenantId:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - email
        - name
        - role
        - tenantId
        - createdAt

    StatusUpdate:
      type: object
      properties:
        status:
          type: string
        rejectionReason:
          type: ["string", "null"]
      required:
        - status

    Vendor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        category:
          type: string
        rating:
          type: number
        totalSpent:
          type: number
        status:
          type: string
          enum: [active, inactive, suspended]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - email
        - phone
        - address
        - category
        - rating
        - totalSpent
        - status
        - createdAt
        - updatedAt

    VendorInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        category:
          type: string
        rating:
          type: number
        status:
          type: string
          enum: [active, inactive, suspended]
      required:
        - name
        - email
        - phone
        - address
        - category
        - rating
        - status

    VendorUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        category:
          type: string
        rating:
          type: number
        status:
          type: string
          enum: [active, inactive, suspended]

    PurchaseOrderItem:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        total:
          type: number
        category:
          type: string
      required:
        - id
        - description
        - quantity
        - unitPrice
        - total
        - category

    PurchaseOrderItemInput:
      type: object
      properties:
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        category:
          type: string
      required:
        - description
        - quantity
        - unitPrice
        - category

    PurchaseOrder:
      type: object
      properties:
        id:
          type: integer
        poNumber:
          type: string
        vendorId:
          type: integer
        vendorName:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItem"
        totalAmount:
          type: number
        status:
          type: string
          enum: [draft, submitted, approved, rejected, received, cancelled]
        notes:
          type: ["string", "null"]
        dueDate:
          type: string
        createdBy:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - poNumber
        - vendorId
        - vendorName
        - items
        - totalAmount
        - status
        - dueDate
        - createdBy
        - createdAt
        - updatedAt

    PurchaseOrderInput:
      type: object
      properties:
        vendorId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItemInput"
        notes:
          type: string
        dueDate:
          type: string
      required:
        - vendorId
        - items
        - dueDate

    PurchaseOrderUpdate:
      type: object
      properties:
        vendorId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseOrderItemInput"
        notes:
          type: string
        dueDate:
          type: string

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        quantity:
          type: number
        reorderLevel:
          type: number
        warehouseLocation:
          type: string
        unitCost:
          type: number
        category:
          type: string
        vendorId:
          type: ["integer", "null"]
        vendorName:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - sku
        - name
        - description
        - quantity
        - reorderLevel
        - warehouseLocation
        - unitCost
        - category
        - createdAt
        - updatedAt

    InventoryItemInput:
      type: object
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        quantity:
          type: number
        reorderLevel:
          type: number
        warehouseLocation:
          type: string
        unitCost:
          type: number
        category:
          type: string
        vendorId:
          type: ["integer", "null"]
      required:
        - sku
        - name
        - description
        - quantity
        - reorderLevel
        - warehouseLocation
        - unitCost
        - category

    InventoryItemUpdate:
      type: object
      properties:
        sku:
          type: string
        name:
          type: string
        description:
          type: string
        quantity:
          type: number
        reorderLevel:
          type: number
        warehouseLocation:
          type: string
        unitCost:
          type: number
        category:
          type: string
        vendorId:
          type: ["integer", "null"]

    AuditLog:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
        changes:
          type: object
        ipAddress:
          type: ["string", "null"]
        timestamp:
          type: string
      required:
        - id
        - userId
        - userName
        - action
        - entityType
        - entityId
        - changes
        - timestamp

    DashboardStats:
      type: object
      properties:
        totalVendors:
          type: integer
        activeOrders:
          type: integer
        pendingApprovals:
          type: integer
        totalSpending:
          type: number
        inventoryValue:
          type: number
        lowStockCount:
          type: integer
      required:
        - totalVendors
        - activeOrders
        - pendingApprovals
        - totalSpending
        - inventoryValue
        - lowStockCount

    VendorSpending:
      type: object
      properties:
        vendorId:
          type: integer
        vendorName:
          type: string
        totalSpent:
          type: number
      required:
        - vendorId
        - vendorName
        - totalSpent

    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required:
        - status
        - count

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [approval_request, order_status, inventory_alert, system]
        title:
          type: string
        message:
          type: string
        read:
          type: boolean
        relatedEntityId:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - type
        - title
        - message
        - read
        - createdAt
