kind = "web"
previewPath = "/"
title = "VendorFlow"
version = "1.0.0"
id = "artifacts/vendorflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23701

[services.development]
run = "pnpm --filter @workspace/vendorflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendorflow", "run", "build" ]
publicDir = "artifacts/vendorflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23701"
BASE_PATH = "/"
